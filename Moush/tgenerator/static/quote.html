<html>
    <head>
        <title>Thirukkural Generator</title>
        <style>
            body{
                justify-content: center;
                align-items: center;
                font-family: Arial, Helvetica, sans-serif;
                background-color: rgb(113, 63, 34);
                display: flex;
                height: 100vh;
                flex-direction: column;
            }
            .box{
                background: wheat;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px gray;
                text-align: center;
                width: 300px;
            }
            button:hover{
                background-color: rgb(167, 148, 23);
            }
        </style>
        </head>
        <body>
            <h1>Thirukkural Generator</h1>
            <div class="box">
                <p id="number">Kural no.</p>
                <p id="kural">Click to see Kural</p>
                <p id="meaning"></p>
                <button onclick="showKural()">Get Thirukkural</button>
            </div>
            <script>
                let kural=[
                    {
                        number:1,
                        kural:"அகர முதல எழுத்தெல்லாம் ஆதி பகவன் முதற்றே உலகு",
                        meaning:"Just like the letter A is the first of all letters, God is the first in the world."
                    },
                    {
                        number:2,
                        kural:"கற்றதனால் ஆய பயனென்கொல் வாலறிவன் நற்றாள் தொழாஅர் எனின்",
                        meaning:"Learning has no value if a person does not respect wisdom."
                    },
                    {
                        number:3,
                        kural:"மலர்மிசை ஏகினான் மாணடி சேர்ந்தார் நிலமிசை நீடுவாழ் வார்",
                        meaning:"People who follow good values will live a good life."
                    }
                ];
                function showKural(){
                    let random = Math.floor(Math.random()*kural.length);
                    document.getElementById("number").innerText ="Kural Number:" + kural[random].number;
                    document.getElementById("kural").innerText = kural[random].kural;
                    document.getElementById("meaning").innerText = kural[random].meaning;
                }
            </script>
        </body>
    
</html>
